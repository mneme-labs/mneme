  # ── Monitoring ───────────────────────────────────────────────────────────────
  prometheus:
    <<: [*prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2"

  grafana:
    <<: [*prod-restart, *prod-logging]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "2"
