  # ── HA Cores ─────────────────────────────────────────────────────────────────
  mneme-core-1:
    <<: [*prod-restart, *prod-security, *prod-logging]
    deploy:
      resources:
        limits:
          memory: ${CORE_MEM_LIMIT:-4g}
          cpus: "${CORE_CPU_LIMIT:-8}"
        reservations:
          memory: 512m

  mneme-core-2:
    <<: [*prod-restart, *prod-security, *prod-logging]
    deploy:
      resources:
        limits:
          memory: ${CORE_MEM_LIMIT:-4g}
          cpus: "${CORE_CPU_LIMIT:-8}"
        reservations:
          memory: 512m

  mneme-core-3:
    <<: [*prod-restart, *prod-security, *prod-logging]
    deploy:
      resources:
        limits:
          memory: ${CORE_MEM_LIMIT:-4g}
          cpus: "${CORE_CPU_LIMIT:-8}"
        reservations:
          memory: 512m

  mneme-ha-keeper-1:
    <<: [*prod-restart, *prod-security, *prod-logging]
    deploy:
      resources:
