# MnemeCache Keeper nodes (Hypnos)
# StatefulSet with 3 replicas. Each pod gets its own PVC for WAL + cold store.
# Keepers connect outbound to the Core replication port (7379) on startup.
---
# Headless Service — used by init container to resolve Core DNS + per-pod DNS
apiVersion: v1
kind: Service
metadata:
  name: mneme-keeper
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: keeper
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "9090"
    prometheus.io/path:   "/metrics"
spec:
  clusterIP: None     # headless — each pod gets a stable DNS name
  selector:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: keeper
  ports:
    - name: replication
      port: 7379
      targetPort: 7379
    - name: metrics
      port: 9090
      targetPort: 9090

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mneme-keeper-config
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: keeper
data:
  # Template — the init container patches node_id and replication_addr
  # using the pod ordinal index injected via the downward API.
  mneme.toml: |
    [node]
    role       = "keeper"
    # node_id is patched by the init container: "hypnos-0", "hypnos-1", "hypnos-2"
    node_id    = "hypnos-PATCH"
    bind       = "0.0.0.0"
    rep_port   = 7379
    metrics_port = 9090
    # Core replication endpoint
    core_addr  = "mneme-core.mneme.svc.cluster.local:7379"

    [memory]
    pool_bytes         = "2gb"    # cold-store grant — match PVC size
    eviction_threshold = 0.90
    huge_pages         = false

    [persistence]
    wal_dir             = "/var/lib/mneme"
    snapshot_interval_s = 60
    wal_max_mb          = 512

    [tls]
    cert          = "/var/lib/mneme/node.crt"
    key           = "/var/lib/mneme/node.key"
    ca_cert       = "/etc/mneme/ca.crt"
    auto_generate = true
    server_name   = "mneme-core"

    [auth]
    # Loaded from MNEME_CLUSTER_SECRET env var at runtime
    cluster_secret = ""

    [logging]
    level  = "info"
    format = "json"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mneme-keeper
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: keeper
spec:
  serviceName: mneme-keeper
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: mneme
      app.kubernetes.io/component: keeper
  podManagementPolicy: Parallel   # start all Keepers simultaneously on rollout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mneme
        app.kubernetes.io/component: keeper
    spec:
      serviceAccountName: mneme-keeper
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # Init container: wait for Core to be ready + patch node_id in config
      initContainers:
        - name: config-patch
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              # Derive node index from hostname (mneme-keeper-0, -1, -2 …)
              IDX="${HOSTNAME##*-}"
              NODE_ID="hypnos-${IDX}"
              # Patch the config template
              sed "s/hypnos-PATCH/${NODE_ID}/" /config-template/mneme.toml \
                > /etc/mneme/mneme.toml
              echo "Config patched: node_id = ${NODE_ID}"
              # Wait for Core to be reachable (TCP connect, 30s timeout)
              timeout=30
              until nc -z mneme-core.mneme.svc.cluster.local 7379 2>/dev/null; do
                timeout=$((timeout - 1))
                [ $timeout -le 0 ] && echo "Core not ready after 30s" && exit 1
                sleep 1
              done
              echo "Core is ready"
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config-writable
              mountPath: /etc/mneme
      containers:
        - name: mneme-keeper
          image: mnemelabs/keeper:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/mneme-keeper"]
          args: ["--config", "/etc/mneme/mneme.toml"]
          ports:
            - containerPort: 7379
              name: replication
            - containerPort: 9090
              name: metrics
          env:
            - name: MNEME_CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: mneme-auth
                  key: cluster_secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "3Gi"    # 2gb pool + WAL buffers + OS overhead
          volumeMounts:
            - name: data
              mountPath: /var/lib/mneme
            - name: config-writable
              mountPath: /etc/mneme
          livenessProbe:
            tcpSocket:
              port: 7379
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 7379
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: config-template
          configMap:
            name: mneme-keeper-config
        - name: config-writable
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # Use a fast StorageClass (local-path, gp3, premium, etc.)
        # storageClassName: local-path
        resources:
          requests:
            storage: 20Gi   # WAL (512 MB) + snapshots + cold B-tree

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mneme-keeper
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: keeper

---
# PodDisruptionBudget — ensure at least 2 Keepers are up during maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mneme-keeper-pdb
  namespace: mneme
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mneme
      app.kubernetes.io/component: keeper
