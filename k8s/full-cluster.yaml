          command:
            - sh
            - -c
            - |
              set -eu
              IDX="${HOSTNAME##*-}"
              NODE_ID="replica-${IDX}"
              sed "s/replica-PATCH/${NODE_ID}/" /config-template/replica.toml \
                > /etc/mneme/replica.toml
              echo "Config patched: node_id = ${NODE_ID}"
              timeout=30
              until nc -z mneme-core.mneme.svc.cluster.local 7379 2>/dev/null; do
                timeout=$((timeout - 1))
                [ $timeout -le 0 ] && echo "Core not ready after 30s" && exit 1
                sleep 1
              done
              echo "Core is ready"
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
