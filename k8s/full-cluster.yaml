          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config-writable
              mountPath: /etc/mneme
      containers:
        - name: mneme-replica
          image: mnemelabs/core:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/mneme-core"]
          args: ["--config", "/etc/mneme/replica.toml"]
          ports:
