            - name: MNEME_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mneme-auth
                  key: admin_password
          resources:
            requests:
              cpu: "500m"
              memory: "1.5Gi"
            limits:
              cpu: "2"
