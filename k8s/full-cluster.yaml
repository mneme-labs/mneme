    prometheus.io/port:   "9090"
    prometheus.io/path:   "/metrics"
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: replica
  ports:
    - name: client
      port: 6380
      targetPort: 6380
    - name: metrics
      port: 9090
      targetPort: 9090

---
apiVersion: v1
kind: Service
metadata:
  name: mneme-replica-read
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: replica
spec:
  selector:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: replica
  ports:
    - name: client
      port: 6380
      targetPort: 6380
      protocol: TCP
    - name: metrics
