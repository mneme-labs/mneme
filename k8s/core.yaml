# MnemeCache Core node (Mnemosyne)
# Single-replica StatefulSet — Core is a Raft leader; scale by adding
# read-replica pods (see replica.yaml), not by increasing replicas here.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mneme-core-config
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: core
data:
  mneme.toml: |
    [node]
    role       = "core"
    node_id    = "mneme-core-0"
    bind       = "0.0.0.0"
    port       = 6379
    rep_port   = 7379
    metrics_port = 9090

    [memory]
    # Match this to the Pod's memory.limits below
    pool_bytes         = "1gb"
    eviction_threshold = 0.90
    huge_pages         = false   # disable in Kubernetes (requires host config)

    [cluster]
    heartbeat_ms     = 500
    election_min_ms  = 1500
    election_max_ms  = 3000
    quorum_timeout_ms = 200

    [persistence]
    wal_dir             = "/var/lib/mneme"
    snapshot_interval_s = 60
    wal_max_mb          = 256

    [tls]
    cert          = "/var/lib/mneme/node.crt"
    key           = "/var/lib/mneme/node.key"
    ca_cert       = "/etc/mneme/ca.crt"
    auto_generate = true
    server_name   = "mneme-core"
    # Include Pod IP and headless service DNS in the cert's SAN list
    extra_sans    = ["mneme-core.mneme.svc.cluster.local"]

    [auth]
    users_db       = "/var/lib/mneme/users.db"
    # Loaded from MNEME_CLUSTER_SECRET env var at runtime (see env below)
    cluster_secret = ""
    token_ttl_h    = 24

    [connections]
    max_total       = 100000
    max_per_ip      = 1000
    idle_timeout_s  = 30
    tcp_keepalive_s = 10
    max_in_flight   = 200000
    request_timeout_ms = 5000

    [databases]
    max_databases    = 16
    default_database = 0

    [logging]
    level  = "info"
    format = "json"

---
apiVersion: v1
kind: Service
metadata:
  name: mneme-core
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: core
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "9090"
    prometheus.io/path:   "/metrics"
spec:
  selector:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: core
  ports:
    - name: client
      port: 6379
      targetPort: 6379
      protocol: TCP
    - name: replication
      port: 7379
      targetPort: 7379
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  type: ClusterIP

---
# NodePort for external client access — remove if using an Ingress or LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: mneme-core-external
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: core
spec:
  selector:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: core
  ports:
    - name: client
      port: 6379
      targetPort: 6379
      nodePort: 30379
      protocol: TCP
  type: NodePort

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mneme-core
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: core
    app.kubernetes.io/version: "1.0.0"
spec:
  serviceName: mneme-core
  replicas: 1    # Core is a single Raft leader — do not increase
  selector:
    matchLabels:
      app.kubernetes.io/name: mneme
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mneme
        app.kubernetes.io/component: core
    spec:
      serviceAccountName: mneme-core
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mneme-core
          image: mnemelabs/core:1.0.0
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/mneme-core"]
          args: ["--config", "/etc/mneme/mneme.toml"]
          ports:
            - containerPort: 6379
              name: client
            - containerPort: 7379
              name: replication
            - containerPort: 9090
              name: metrics
          env:
            # Override cluster_secret from the Secret
            - name: MNEME_CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: mneme-auth
                  key: cluster_secret
            - name: MNEME_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mneme-auth
                  key: admin_password
          resources:
            requests:
              cpu: "500m"
              memory: "1.5Gi"    # pool_bytes (1gb) + overhead
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mneme
            - name: config
              mountPath: /etc/mneme/mneme.toml
              subPath: mneme.toml
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: mneme-core-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi   # certs + users.db + WAL (Core generates small WAL)

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mneme-core
  namespace: mneme
  labels:
    app.kubernetes.io/name: mneme
    app.kubernetes.io/component: core
