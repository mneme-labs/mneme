# MnemeCache — Core node config for Docker Compose
# Used by: docker-compose.yml → mneme-core service

[node]
role         = "core"
node_id      = "mnemosyne-1"
bind         = "0.0.0.0"
port         = 6379
rep_port     = 7379
metrics_port = 9090
io_threads   = 0
join_token   = "docker-join-token-change-in-production"

[memory]
pool_bytes          = "512mb"
eviction_threshold  = 0.90
# huge_pages disabled — requires host kernel config (vm.nr_hugepages > 0)
huge_pages          = false
promotion_threshold = 10

[cluster]
heartbeat_ms      = 500
election_min_ms   = 1500
election_max_ms   = 3000
quorum_timeout_ms = 200

[read_replicas]
enabled      = false
lag_alert_ms = 50

[persistence]
wal_dir             = "/var/lib/mneme"
snapshot_interval_s = 60
wal_max_mb          = 64
wal_compression     = "zstd"

[tls]
cert          = "/var/lib/mneme/node.crt"
key           = "/var/lib/mneme/node.key"
ca_cert       = "/var/lib/mneme/ca.crt"
auto_generate = true
# Include the Docker service hostname so mneme-cli -H mneme-core:6379 works without --insecure
extra_sans    = ["mneme-core"]

[auth]
users_db       = "/var/lib/mneme/users.db"
token_ttl_h    = 24

[logging]
level  = "info"
format = "json"
